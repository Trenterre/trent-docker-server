version: "3"

services:
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80/tcp"
    environment:
      TZ: 'America/Toronto'
      WEBPASSWORD: ${PIHOLE_WEBPASSWORD}
      ServerIP: '192.168.1.3' # <-- ADD THIS LINE
    volumes:
      - './etc-pihole:/etc/pihole'
      - './etc-dnsmasq.d:/etc/dnsmasq.d'
    cap_add:
      - NET_ADMIN
    networks: # <-- ADD THIS SECTION
      - media_network

networks: # <-- AND THIS WHOLE SECTION AT THE END
  media_network:
    external: true
