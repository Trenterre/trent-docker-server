version: "3.7"
services:
  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      - VPN_SERVICE_PROVIDER=nordvpn
      
      # OpenVPN Configuration (Active)
      - VPN_TYPE=openvpn
      - OPENVPN_USER=${OPENVPN_USER}
      - OPENVPN_PASSWORD=${OPENVPN_PASSWORD}
      - SERVER_COUNTRIES=Canada
      
      # WireGuard Configuration (Commented out)
      # - VPN_TYPE=wireguard
      # - WIREGUARD_PRIVATE_KEY=${NORDVPN_WIREGUARD_KEY}
      # - DNS_UPSTREAM_RESOLVER_TYPE=plain
      # - DNS_UPSTREAM_PLAIN_ADDRESSES=10.5.0.1:53,1.1.1.1:53
      
      # Critical Common Settings (Required for LAN Access & Stable DNS)
      - FIREWALL_OUTBOUND_SUBNETS=192.168.1.0/24 # Allows LAN access to exposed ports
      - DNS_KEEP_NAMESERVERS=on # Prevents Unbound DNS hangs and blocklist download timeouts
      - BLOCK_MALICIOUS=off # Disables DNS blocklists download to prevent boot hangs
    ports:
      - "8081:8080"     # qBittorrent WebUI (through VPN)
      - "9696:9696"     # Prowlarr WebUI (through VPN)
      - "6881:6881"     # Torrent TCP
      - "6881:6881/udp" # Torrent UDP
    networks:
      - media_network

  qbittorrent:
    image: ghcr.io/hotio/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
    volumes:
      - ./config/qbittorrent:/config
      - /mnt/data:/data # <-- Restructured for atomic hard links

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    network_mode: "service:gluetun" # <-- Routed through VPN
    depends_on:
      - gluetun
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
    volumes:
      - ./config/prowlarr:/config

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
    volumes:
      - ./config/sonarr:/config
      - /mnt/data:/data # <-- Restructured for atomic hard links
    ports:
      - "8989:8989"
    networks:
      - media_network

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
    volumes:
      - ./config/radarr:/config
      - /mnt/data:/data # <-- Restructured for atomic hard links
    ports:
      - "7878:7878"
    networks:
      - media_network

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    network_mode: "service:gluetun" # <-- Routed through VPN
    depends_on:
      - gluetun
    environment:
      - LOG_LEVEL=info
      - TZ=America/Toronto

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
    volumes:
      - ./config/jellyseerr:/app/config
    ports:
      - "5055:5055"
    networks:
      - media_network

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Toronto
    volumes:
      - ./bazarr-config:/config
      - /mnt/data:/data # <-- Restructured for atomic hard links
    ports:
      - 6767:6767
    restart: unless-stopped
    networks:
      - media_network

  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    container_name: whisper
    environment:
      - ASR_MODEL=small
      - ASR_ENGINE=openai_whisper
    volumes:
      - ./whisper-cache:/root/.cache/whisper
    ports:
      - 9000:9000
    restart: unless-stopped
    networks:
      - media_network

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * *
      - DOCKER_API_VERSION=1.44 # Fixes API version mismatch with modern Docker daemons
    restart: unless-stopped
    networks:
      - media_network

networks:
  media_network:
    external: true
