- Core Infrastructure:
    - Pi-hole:
        icon: pi-hole.svg
        href: http://192.168.1.3:8080/admin
        description: DNS Resolver & Ad-Blocker
        server: my-docker
        container: pihole
        widget:
          type: pihole
          url: http://pihole
          version: 6 # Required for Pi-hole v6
          key: PiHole1! # Placed from your server-wide secret configs

