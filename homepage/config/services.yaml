# services.yaml - Application cards, widgets, and live API integrations
- Media Stack:
    - Jellyfin:
        icon: jellyfin.svg
        href: http://jellyfin.home.lan
        description: Private Streaming Library
        server: my-docker
        container: jellyfin
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: JELLYFIN_API_KEY_HERE # Generate in Jellyfin -> Admin Dashboard -> API Keys
          
    - Jellyseerr:
        icon: jellyseerr.svg
        href: http://seerr.home.lan
        description: Media Request Portal
        server: my-docker
        container: jellyseerr
        widget:
          type: jellyseerr
          url: http://jellyseerr:5055
          key: JELLYSEERR_API_KEY_HERE # Generate in Jellyseerr -> Settings -> General -> API Key

    - qBittorrent:
        icon: qbittorrent.svg
        href: http://torrent.home.lan
        description: Seedbox & Torrent Engine
        server: my-docker
        container: qbittorrent
        widget:
          type: qbittorrent
          url: http://gluetun:8080 # Resolves through VPN internally!
          username: admin # Update if you use a custom WebUI username
          password: QBIT_PASSWORD_HERE # Replace with your qBittorrent WebUI password

